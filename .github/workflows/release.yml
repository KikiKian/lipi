name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install Linux dependencies
        run: sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Build
        working-directory: desktop
        run: wails build -platform linux/amd64 -o Lipi-linux-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: desktop/build/bin/Lipi-linux-amd64

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build
        working-directory: desktop
        run: wails build -platform darwin/universal -o Lipi-macos-universal

      - name: Zip macOS app
        run: zip -r desktop/build/bin/Lipi-macos-universal.zip desktop/build/bin/Lipi-macos-universal.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: desktop/build/bin/Lipi-macos-universal.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build
        working-directory: desktop
        run: wails build -platform windows/amd64 -o Lipi-windows-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: desktop/build/bin/Lipi-windows-amd64.exe

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            linux/Lipi-linux-amd64
            macos/Lipi-macos-universal.zip
            windows/Lipi-windows-amd64.exe
